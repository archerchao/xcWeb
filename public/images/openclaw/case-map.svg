<svg width="1200" height="650" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 38px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .main { font: 700 30px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .text { font: 400 20px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #374151; }
      .line { stroke: #6b7280; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1200" height="650" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" class="title">OpenClaw 使用案例地图</text>

  <circle cx="600" cy="330" r="120" fill="#111827"/>
  <text x="600" y="325" text-anchor="middle" fill="#ffffff" class="main">OpenClaw</text>
  <text x="600" y="365" text-anchor="middle" fill="#d1d5db" class="text">个人执行系统</text>

  <rect x="80" y="120" width="300" height="140" rx="16" ry="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <text x="230" y="175" text-anchor="middle" class="main" style="font-size:24px">网站搭建</text>
  <text x="230" y="215" text-anchor="middle" class="text">开发 + 部署 + 托管</text>

  <rect x="820" y="120" width="300" height="140" rx="16" ry="16" fill="#dcfce7" stroke="#34d399" stroke-width="3"/>
  <text x="970" y="175" text-anchor="middle" class="main" style="font-size:24px">知识库整理</text>
  <text x="970" y="215" text-anchor="middle" class="text">归档 + 摘要 + 检索</text>

  <rect x="80" y="430" width="300" height="140" rx="16" ry="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="230" y="485" text-anchor="middle" class="main" style="font-size:24px">运维巡检</text>
  <text x="230" y="525" text-anchor="middle" class="text">定时检查 + 告警提醒</text>

  <rect x="820" y="430" width="300" height="140" rx="16" ry="16" fill="#fee2e2" stroke="#f87171" stroke-width="3"/>
  <text x="970" y="485" text-anchor="middle" class="main" style="font-size:24px">自动化协作</text>
  <text x="970" y="525" text-anchor="middle" class="text">多步骤任务闭环</text>

  <line x1="380" y1="190" x2="500" y2="260" class="line"/>
  <line x1="820" y1="190" x2="700" y2="260" class="line"/>
  <line x1="380" y1="500" x2="500" y2="400" class="line"/>
  <line x1="820" y1="500" x2="700" y2="400" class="line"/>
</svg>
