<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 38px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .stepTitle { font: 700 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .stepText { font: 400 19px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #374151; }
      .arrow { stroke: #6b7280; stroke-width: 4; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280" />
    </marker>
  </defs>

  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" class="title">OpenClaw 从安装到上线流程</text>

  <g transform="translate(70,180)">
    <rect rx="18" ry="18" width="220" height="220" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
    <text x="110" y="60" text-anchor="middle" class="stepTitle">① 环境检查</text>
    <text x="110" y="108" text-anchor="middle" class="stepText">Node / 网络</text>
    <text x="110" y="142" text-anchor="middle" class="stepText">sudo / 端口</text>
    <text x="110" y="176" text-anchor="middle" class="stepText">目录权限</text>
  </g>

  <g transform="translate(350,180)">
    <rect rx="18" ry="18" width="220" height="220" fill="#dcfce7" stroke="#34d399" stroke-width="3"/>
    <text x="110" y="60" text-anchor="middle" class="stepTitle">② 安装启动</text>
    <text x="110" y="108" text-anchor="middle" class="stepText">安装 OpenClaw</text>
    <text x="110" y="142" text-anchor="middle" class="stepText">gateway start</text>
    <text x="110" y="176" text-anchor="middle" class="stepText">status 验证</text>
  </g>

  <g transform="translate(630,180)">
    <rect rx="18" ry="18" width="220" height="220" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="110" y="60" text-anchor="middle" class="stepTitle">③ 通道联调</text>
    <text x="110" y="108" text-anchor="middle" class="stepText">配置渠道</text>
    <text x="110" y="142" text-anchor="middle" class="stepText">发送测试消息</text>
    <text x="110" y="176" text-anchor="middle" class="stepText">修复连接问题</text>
  </g>

  <g transform="translate(910,180)">
    <rect rx="18" ry="18" width="220" height="220" fill="#fee2e2" stroke="#f87171" stroke-width="3"/>
    <text x="110" y="60" text-anchor="middle" class="stepTitle">④ 上线运维</text>
    <text x="110" y="108" text-anchor="middle" class="stepText">日志与告警</text>
    <text x="110" y="142" text-anchor="middle" class="stepText">定时任务</text>
    <text x="110" y="176" text-anchor="middle" class="stepText">版本升级</text>
  </g>

  <line x1="290" y1="290" x2="350" y2="290" class="arrow"/>
  <line x1="570" y1="290" x2="630" y2="290" class="arrow"/>
  <line x1="850" y1="290" x2="910" y2="290" class="arrow"/>
</svg>
