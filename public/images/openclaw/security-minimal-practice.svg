<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" fill="#f8fafc"/>
  <text x="600" y="72" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="40" font-weight="700" fill="#0f172a">OpenClaw 极简安全实践三层模型</text>
  <rect x="180" y="140" width="840" height="140" rx="22" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="600" y="205" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="34" font-weight="700" fill="#991b1b">事前：红线/黄线 + 安装审计</text>
  <text x="600" y="245" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" fill="#7f1d1d">先定义不能做什么，再谈怎么做</text>
  <rect x="180" y="305" width="840" height="140" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="600" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="34" font-weight="700" fill="#92400e">事中：权限收窄 + 基线校验 + 风控前置</text>
  <text x="600" y="410" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" fill="#78350f">把高危动作变成可阻断、可追溯</text>
  <rect x="180" y="470" width="840" height="140" rx="22" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="600" y="535" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="34" font-weight="700" fill="#166534">事后：自动巡检 + 显性化汇报 + 灾备</text>
  <text x="600" y="575" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" fill="#14532d">每天看得见，出事能恢复</text>
</svg>