<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 38px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .cardTitle { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .cardText { font: 400 20px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#f9fafb"/>
  <text x="600" y="70" text-anchor="middle" class="title">OpenClaw 三种常用模式</text>

  <g transform="translate(80,160)">
    <rect width="320" height="360" rx="22" ry="22" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
    <text x="160" y="70" text-anchor="middle" class="cardTitle">即时问答</text>
    <text x="160" y="125" text-anchor="middle" class="cardText">临时问题快速答复</text>
    <text x="160" y="165" text-anchor="middle" class="cardText">适合查资料/解释概念</text>
    <text x="160" y="235" text-anchor="middle" class="cardText">关键词：快</text>
  </g>

  <g transform="translate(440,160)">
    <rect width="320" height="360" rx="22" ry="22" fill="#dcfce7" stroke="#34d399" stroke-width="3"/>
    <text x="160" y="70" text-anchor="middle" class="cardTitle">任务执行</text>
    <text x="160" y="125" text-anchor="middle" class="cardText">多步骤落地工作</text>
    <text x="160" y="165" text-anchor="middle" class="cardText">改代码/写文档/配服务</text>
    <text x="160" y="235" text-anchor="middle" class="cardText">关键词：稳</text>
  </g>

  <g transform="translate(800,160)">
    <rect width="320" height="360" rx="22" ry="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="160" y="70" text-anchor="middle" class="cardTitle">周期提醒</text>
    <text x="160" y="125" text-anchor="middle" class="cardText">按时触发固定任务</text>
    <text x="160" y="165" text-anchor="middle" class="cardText">巡检/复盘/备份提醒</text>
    <text x="160" y="235" text-anchor="middle" class="cardText">关键词：省心</text>
  </g>
</svg>
